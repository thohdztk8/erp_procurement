version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: procurement_db
    environment:
      SA_PASSWORD: "${DB_PASSWORD:-YourStrong@Password123}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"           # Expose để kết nối bằng SSMS / DBeaver từ host
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools/bin/sqlcmd
        -S localhost -U sa -P "${DB_PASSWORD:-YourStrong@Password123}"
        -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: procurement_redis
    ports:
      - "6379:6379"           # Expose để debug từ host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: procurement_app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app              # Hot-reload: mount toàn bộ src
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: procurement_worker
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    command: >
      celery -A infrastructure.tasks.celery worker
      --loglevel=info
      --concurrency=2
      -Q default,emails
    volumes:
      - ./src:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: procurement_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
    depends_on:
      - app

volumes:
  mssql_data:
  redis_data:
  media_data:
