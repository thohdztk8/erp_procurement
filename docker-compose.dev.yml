version: "3.9"

services:
  # ── Microsoft SQL Server 2022 ──────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: procurement_db
    restart: always
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Standard"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./sql/db.sql:/docker-entrypoint-initdb.d/db.sql:z
      - ./sql/seed_master_data.sql:/docker-entrypoint-initdb.d/seed_master_data.sql:z
      - ./sql/init.sh:/init.sh:z
    ports:
      - "1433:1433"           # Expose để kết nối bằng SSMS / DBeaver từ host
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -C -Q 'SELECT 1' -b -o /dev/null"
      ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    entrypoint: >
      /bin/bash -c "/opt/mssql/bin/sqlservr & /init.sh && wait"

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: procurement_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: procurement_app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    ports:
      - "2681:8000"
    volumes:
      - ./src:/app              # Hot-reload: mount toàn bộ src
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: procurement_worker
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    command: >
      celery -A infrastructure.tasks.celery worker
      --loglevel=info
      --concurrency=2
      -Q default,emails
    volumes:
      - ./src:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: procurement_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

  nginx:
    image: nginx:1.27-alpine
    container_name: procurement_nginx
    ports:
      - "2680:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - app
      - frontend

volumes:
  mssql_data:
  redis_data:
  media_data:
  static_data:
